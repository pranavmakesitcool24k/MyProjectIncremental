<!DOCTYPE html>
<html>
<head>
    <title>Login and Registration</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.css">

    <!-- Validation JS -->
    <script src="js/validation.js"></script>
</head>
<body>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-6">

            <h3>Login</h3>

            <form>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" class="form-control">
                </div>

                <div class="form-group mt-2">
                    <label>Password</label>
                    <input type="password" id="loginPassword" class="form-control">
                </div>

                <button type="button" class="btn btn-primary mt-3" onclick="login()">Login</button>
            </form>

        </div>

        <div class="col-md-6">

            <h3>Registration</h3>

            <form>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="regName" class="form-control">
                </div>

                <div class="form-group mt-2">
                    <label>Email</label>
                    <input type="email" id="regEmail" class="form-control">
                </div>

                <div class="form-group mt-2">
                    <label>Username</label>
                    <input type="text" id="regUsername" class="form-control">
                </div>

                <div class="form-group mt-2">
                    <label>Password</label>
                    <input type="password" id="regPassword" class="form-control">
                </div>

                <button type="button" class="btn btn-success mt-3" onclick="register()">Register</button>
            </form>

        </div>
    </div>
</div>

</body>
</html>
